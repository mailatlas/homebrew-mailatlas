name: Audit

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Audit formula
        run: |
          brew tap mailatlas/mailatlas "$GITHUB_WORKSPACE"
          brew audit --strict --formula mailatlas/mailatlas/mailatlas
